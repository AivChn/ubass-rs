[package]
name = "ubass-rs"
version = "0.0.1"
edition = "2024"

[lib]
name = "ubass"
path = "src/lib.rs"

[dependencies]
ubass_macros = { path = "ubass_macros"}
uniffi = { version = "0.31.0", features = ["cli"]}
aes-gcm-siv = "0.11.1"
futures = "0.3.31"
reed-solomon-simd = "3.1.0"
serde = "1.0.228"
tokio = {version = "1.49.0", features=["full"]}
tokio-scoped = "0.2.0"
wincode = { version = "0.2.5", features = ["derive", "solana-short-vec"] }

[build-dependencies]
uniffi = { version = "0.31.0", features = ["build"]}
